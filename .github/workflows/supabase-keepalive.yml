name: Supabase Keep-Alive

on:
  schedule:
    - cron: '0 8 */3 * *'  # Toutes les 3 jours à 8h UTC
  workflow_dispatch:        # Déclenchement manuel si besoin

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase health
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://bcrippmehqoualtgazbm.supabase.co/health")
          echo "Supabase status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "⚠️ Supabase not responding (status $STATUS)"
            exit 1
          fi
          echo "✅ Supabase OK"
